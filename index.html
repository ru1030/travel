// 在一般網站上用瀏覽器的 localStorage 做保存（取代對話環境的儲存功能）
if (!window.storage) {
  window.storage = {
    async get(key) {
      const v = localStorage.getItem(key);
      if (v === null) throw new Error("not found");
      return { key, value: v, shared: false };
    },
    async set(key, value) { localStorage.setItem(key, value); return { key, value, shared: false }; },
    async delete(key) { localStorage.removeItem(key); return { key, deleted: true, shared: false }; },
    async list(prefix = "") {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k.startsWith(prefix)) keys.push(k);
      }
      return { keys, prefix, shared: false };
    },
  };
}

   旅程安排 — Travel Itinerary
   功能：
   - 依現在時間標出進行中 / 接下來的行程（行程時間軸）
   - 每日行程含「景點」與「餐食」，餐食可放多家備選，已訂位者明確顯示訂位資訊
   - 行程列表只顯示簡要內容，點開可看詳細
   - 編輯模式：改標題、增刪每一天、增刪 / 編輯每筆行程與餐廳訂位
   - 待購清單：可分類、勾選、新增、刪除
   - 所有編輯（行程 + 清單）都會被保存
   ========================================================================= */

const WEEK = ["日", "一", "二", "三", "四", "五", "六"];

function todayISO() {
  const d = new Date();
  return isoOf(d);
}
function isoOf(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(
    d.getDate()
  ).padStart(2, "0")}`;
}
function isoOffset(offsetDays) {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + offsetDays);
  return isoOf(d);
}
function addDaysISO(iso, n) {
  const d = new Date(iso + "T00:00:00");
  d.setDate(d.getDate() + n);
  return isoOf(d);
}
function combine(iso, hhmm) {
  return new Date(`${iso}T${(hhmm || "00:00")}:00`);
}
function fmtDateISO(iso) {
  const d = new Date(iso + "T00:00:00");
  return `${d.getMonth() + 1}/${d.getDate()} (${WEEK[d.getDay()]})`;
}
function fmtClock(d) {
  return `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
}
function mapHref(q) {
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`;
}
const newId = () =>
  typeof crypto !== "undefined" && crypto.randomUUID

    : `${Date.now()}-${Math.random().toString(16).slice(2)}`;

.tj-opt{border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-bottom:9px;background:var(--surface);}
.tj-opt:last-child{margin-bottom:0;}
.tj-opt[data-res="true"]{border-color:#C9CAE0;background:var(--accent-soft);}
.tj-opt-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.tj-opt-name{font-size:14px;font-weight:600;}
.tj-opt-meta{font-size:12px;color:var(--muted);}
.tj-pill{font-size:10px;font-weight:700;letter-spacing:.04em;padding:2px 7px;border-radius:20px;}
.tj-pill[data-res="true"]{background:var(--accent);color:#fff;}
.tj-pill[data-res="false"]{background:var(--inset);color:var(--muted);}
.tj-opt-note{font-size:12.5px;color:var(--muted);line-height:1.5;margin:6px 0 0;}
.tj-res{margin-top:9px;border-top:1px dashed #C9CAE0;padding-top:9px;display:grid;grid-template-columns:auto 1fr;gap:5px 12px;}
.tj-res dt{font-size:11px;color:var(--accent-ink);font-weight:600;opacity:.8;}
.tj-res dd{font-size:13px;margin:0;font-variant-numeric:tabular-nums;}
.tj-res a{color:var(--accent);text-decoration:none;}
.tj-res a:hover{text-decoration:underline;}

.tj-marker{position:relative;margin:2px 0 16px;display:flex;align-items:center;gap:8px;}
.tj-marker::before{content:"";position:absolute;left:-15px;top:50%;transform:translateY(-50%);

.tj-marker-line{flex:1;border-top:1.5px dashed var(--now);opacity:.55;}
.tj-marker-label{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--now);

/* Shopping list */
.tj-sl-head{display:flex;align-items:baseline;justify-content:space-between;margin:4px 0 14px;}
.tj-sl-head h2{font-family:'Fraunces',serif;font-weight:600;font-size:21px;margin:0;}

.tj-sl-right{display:flex;align-items:center;gap:12px;}
.tj-icon-add{flex:0 0 auto;width:32px;height:32px;border-radius:9px;border:1px solid var(--accent);

.tj-icon-add svg{width:17px;height:17px;stroke:currentColor;}

.tj-filters{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;}
.tj-filters::-webkit-scrollbar{display:none;}
.tj-filter{flex:0 0 auto;border:0;border-bottom:2px solid transparent;background:transparent;border-radius:0;

.tj-filter[data-active="true"]{color:var(--ink);border-bottom-color:var(--ink);}
.tj-cat-head{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin:18px 0 4px;}
.tj-cat-head:first-child{margin-top:6px;}
.tj-item{display:flex;align-items:center;gap:12px;padding:13px 2px;border-bottom:1px solid var(--line);}
.tj-check{flex:0 0 auto;width:21px;height:21px;border-radius:50%;border:2px solid var(--line-strong);

.tj-check[data-done="true"]{background:var(--accent);border-color:var(--accent);}
.tj-check svg{width:12px;height:12px;stroke:#fff;}
.tj-item-text{flex:1;font-size:14px;}
.tj-item[data-done="true"] .tj-item-text{color:var(--faint);text-decoration:line-through;}
.tj-del{flex:0 0 auto;border:0;background:transparent;color:var(--faint);cursor:pointer;font-size:18px;

/* Modal / sheet editor */
.tj-overlay{position:fixed;inset:0;background:rgba(20,22,18,.42);display:flex;align-items:flex-end;
  justify-content:center;z-index:50;padding:0;animation:tj-fade .15s;}
.tj-sheet{background:var(--bg);width:100%;max-width:540px;max-height:90vh;border-radius:20px 20px 0 0;
  display:flex;flex-direction:column;animation:tj-slide .2s;}
.tj-sheet-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;border-bottom:1px solid var(--line);}
.tj-sheet-head h3{font-family:'Fraunces',serif;font-size:18px;font-weight:600;margin:0;}

select.tj-fi{appearance:none;-webkit-appearance:none;cursor:pointer;
  background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);
  background-position:calc(100% - 14px) 14px,calc(100% - 9px) 14px;background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:24px;}
.tj-two{display:flex;gap:10px;}
.tj-two > .tj-field{flex:1;}
.tj-seg{display:flex;gap:6px;}
.tj-seg-btn{flex:1;border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:9px 0;
  font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;}
.tj-seg-btn[data-on="true"]{background:var(--accent);border-color:var(--accent);color:#fff;}
.tj-oedit{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;background:var(--surface);}
.tj-oedit-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.tj-oedit-top span{font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--faint);text-transform:uppercase;}
.tj-toggle{display:flex;align-items:center;gap:9px;cursor:pointer;font-size:13px;font-weight:600;color:var(--ink);margin:4px 0 2px;}
.tj-sw{width:38px;height:22px;border-radius:20px;background:var(--line-strong);position:relative;transition:background .15s;flex:0 0 auto;}
.tj-sw::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .15s;}
.tj-toggle[data-on="true"] .tj-sw{background:var(--accent);}
.tj-toggle[data-on="true"] .tj-sw::after{transform:translateX(16px);}
.tj-res-edit{margin-top:11px;border-top:1px dashed var(--line);padding-top:11px;}
.tj-mini{border:0;background:transparent;color:var(--accent);font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;padding:0;}
.tj-mini[data-danger="true"]{color:var(--danger);}
.tj-btn-primary{flex:1;border:0;background:var(--accent);color:#fff;border-radius:11px;padding:13px;font-size:15px;
  font-weight:600;cursor:pointer;font-family:inherit;}
.tj-btn-ghost{border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:11px;
  padding:13px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.tj-btn-danger{border:1px solid #E6CBC8;background:#FBF1F0;color:var(--danger);border-radius:11px;
  padding:13px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.tj-reset{display:block;margin:22px auto 0;border:0;background:transparent;color:var(--faint);
  font-size:12px;cursor:pointer;font-family:inherit;text-decoration:underline;}

@keyframes tj-pulse{0%,100%{opacity:1;}50%{opacity:.45;}}
@keyframes tj-fade{from{opacity:0;}to{opacity:1;}}
@keyframes tj-slide{from{transform:translateY(16px);}to{transform:translateY(0);}}
@media (prefers-reduced-motion: reduce){
  .tj-live,.tj-row[data-state="current"] .tj-dot,.tj-marker::before{animation:none;}
  .tj-overlay,.tj-sheet{animation:none;}
  *{transition:none!important;}
}

function CheckBig() {

function MealOptions({ options }) {
  if (!options || options.length === 0)
    return <p className="tj-addr">尚未加入餐廳，點右上角鉛筆即可新增備選。</p>;
  return (
    <div>
      {options.map((o, i) => (
        <div className="tj-opt" data-res={o.reserved} key={i}>
          <div className="tj-opt-head">
            <span className="tj-opt-name">{o.name || "（未命名）"}</span>
            <span className="tj-pill" data-res={o.reserved}>{o.reserved ? "已訂位" : "備選"}</span>
            {(o.area || o.price) && <span className="tj-opt-meta">{[o.area, o.price].filter(Boolean).join(" · ")}</span>}
          </div>
          {o.note && <p className="tj-opt-note">{o.note}</p>}
          {o.reserved && o.reservation && (
            <dl className="tj-res">
              {o.reservation.time && (<><dt>時間</dt><dd>{o.reservation.time}</dd></>)}
              {o.reservation.party && (<><dt>人數</dt><dd>{o.reservation.party} 位</dd></>)}
              {o.reservation.holder && (<><dt>訂位人</dt><dd>{o.reservation.holder}</dd></>)}
              {o.reservation.confirmation && (<><dt>訂位編號</dt><dd>{o.reservation.confirmation}</dd></>)}
              {o.reservation.address && (<><dt>地址</dt><dd><a href={mapHref(o.reservation.mapQuery || o.reservation.address)} target="_blank" rel="noreferrer">{o.reservation.address}</a></dd></>)}
            </dl>
          )}
        </div>
      ))}
    </div>
  );
}

function ActivityCard({ item, state, expanded, onToggle, editMode, onEdit }) {
  const meta = TYPE_META[item.type];
  return (
    <div className="tj-card">
      {editMode && (
        <button className="tj-card-edit" onClick={onEdit} aria-label="編輯這筆行程">✎</button>
      )}
      <button className="tj-card-btn" aria-expanded={expanded} onClick={onToggle} style={editMode ? { paddingRight: 50 } : null}>
        <span className="tj-type" data-t={item.type}>{meta.icon} {meta.label}</span>
        <span className="tj-c-main">
          <span className="tj-c-title">
            {item.title || "（未命名行程）"}
            {state === "current" && <span className="tj-live-tag">進行中</span>}
          </span>
          {item.brief && <span className="tj-c-brief">{item.brief}</span>}
        </span>
        <span className="tj-chev">▾</span>
      </button>
      {expanded && (
        <div className="tj-detail">
          {item.notes && <p className="tj-notes">{item.notes}</p>}
          {item.type === "meal" ? (
            <MealOptions options={item.options} />
          ) : (
            item.location && item.location.name && (
              <div>
                <a className="tj-loc" href={mapHref(item.location.mapQuery || item.location.name)} target="_blank" rel="noreferrer">
                  📍 {item.location.name} · <span style={{ textDecoration: "underline" }}>在地圖開啟</span>
                </a>
                {item.location.address && <p className="tj-addr">{item.location.address}</p>}
              </div>
            )
          )}
        </div>
      )}
    </div>
  );
}

function Timeline({ day, isToday, now, currentId, expandedId, setExpandedId, editMode, onEditItem }) {
  const rows = [];
  day.items.forEach((it) => {
    const startDt = combine(day.date, it.start);
    let state = "future";
    if (isToday) {
      if (it.id === currentId) state = "current";
      else if (now >= startDt) state = "past";
    }
    rows.push(
      <div className="tj-row" data-state={state} key={it.id}>
        <div className="tj-time">{it.start}</div>
        <span className="tj-dot" />
        <ActivityCard
          item={it}
          state={state}
          expanded={expandedId === it.id}
          onToggle={() => setExpandedId(expandedId === it.id ? null : it.id)}
          editMode={editMode}
          onEdit={() => onEditItem(it.id)}
        />
      </div>
    );
  });
  if (day.items.length === 0) {
    rows.push(<p className="tj-empty" key="__empty">這一天還沒有行程。{editMode ? "點下方「新增行程」開始安排。" : "開啟編輯模式即可新增。"}</p>);
  }
  return <div className="tj-line">{rows}</div>;
}

/* ----------------------------- Activity editor ----------------------------- */
function ActivityEditor({ initial, isNew, onSave, onDelete, onClose }) {
  const [it, setIt] = useState(() => JSON.parse(JSON.stringify(initial)));
  const [confirmDel, setConfirmDel] = useState(false);

  const set = (k, v) => setIt((p) => ({ ...p, [k]: v }));
  const setLoc = (k, v) => setIt((p) => ({ ...p, location: { ...p.location, [k]: v } }));
  const setOpt = (i, k, v) =>
    setIt((p) => ({ ...p, options: p.options.map((o, idx) => (idx === i ? { ...o, [k]: v } : o)) }));
  const setRes = (i, k, v) =>
    setIt((p) => ({ ...p, options: p.options.map((o, idx) => (idx === i ? { ...o, reservation: { ...o.reservation, [k]: v } } : o)) }));
  const addOpt = () => setIt((p) => ({ ...p, options: [...p.options, emptyOption()] }));
  const removeOpt = (i) => setIt((p) => ({ ...p, options: p.options.filter((_, idx) => idx !== i) }));

  const save = () => {
    const clean = { ...it };
    if (clean.type === "meal") {
      clean.options = clean.options.filter((o) => o.name.trim() !== "");
      clean.location = { name: "", address: "", mapQuery: "" };
    } else {
      clean.options = [];
    }
    onSave(clean);
  };

  return (
    <div className="tj-overlay" onClick={onClose}>
      <div className="tj-sheet" onClick={(e) => e.stopPropagation()}>
        <div className="tj-sheet-head">
          <h3 className="tj-serif">{isNew ? "新增行程" : "編輯行程"}</h3>
          <button className="tj-x" onClick={onClose} aria-label="關閉">×</button>
        </div>

        <div className="tj-sheet-body">
          <div className="tj-field">
            <label className="tj-label">類型</label>
            <div className="tj-seg">
              {TYPE_ORDER.map((t) => (
                <button key={t} className="tj-seg-btn" data-on={it.type === t} onClick={() => set("type", t)}>
                  {TYPE_META[t].icon} {TYPE_META[t].label}
                </button>
              ))}
            </div>
          </div>

          <div className="tj-field">
            <label className="tj-label">開始時間</label>
            <input type="time" className="tj-fi" value={it.start} onChange={(e) => set("start", e.target.value)} />
          </div>

          <div className="tj-field">
            <label className="tj-label">標題</label>
            <input className="tj-fi" placeholder={it.type === "meal" ? "例：午餐" : "例：淺草寺"} value={it.title} onChange={(e) => set("title", e.target.value)} />
          </div>

          <div className="tj-field">
            <label className="tj-label">簡述（列表上顯示的一行）</label>
            <input className="tj-fi" placeholder="一句話摘要" value={it.brief} onChange={(e) => set("brief", e.target.value)} />
          </div>

          {it.type === "meal" ? (
            <div className="tj-field">
              <label className="tj-label">餐廳備選</label>
              {it.options.map((o, i) => (
                <div className="tj-oedit" key={i}>
                  <div className="tj-oedit-top">
                    <span>餐廳 {i + 1}</span>
                    <button className="tj-mini" data-danger="true" onClick={() => removeOpt(i)}>移除</button>
                  </div>
                  <div className="tj-field" style={{ marginBottom: 9 }}>
                    <input className="tj-fi" placeholder="餐廳名稱" value={o.name} onChange={(e) => setOpt(i, "name", e.target.value)} />
                  </div>
                  <div className="tj-two">
                    <div className="tj-field" style={{ marginBottom: 9 }}>
                      <input className="tj-fi" placeholder="區域（如 淺草）" value={o.area} onChange={(e) => setOpt(i, "area", e.target.value)} />
                    </div>
                    <div className="tj-field" style={{ marginBottom: 9 }}>
                      <input className="tj-fi" placeholder="價位（¥¥）" value={o.price} onChange={(e) => setOpt(i, "price", e.target.value)} />
                    </div>
                  </div>
                  <div className="tj-field" style={{ marginBottom: 4 }}>
                    <textarea className="tj-fi" placeholder="備註（如：招牌菜、候位時間）" value={o.note} onChange={(e) => setOpt(i, "note", e.target.value)} />
                  </div>
                  <div className="tj-toggle" data-on={o.reserved} onClick={() => setOpt(i, "reserved", !o.reserved)} role="switch" aria-checked={o.reserved}>
                    <span className="tj-sw" />已訂位
                  </div>
                  {o.reserved && (
                    <div className="tj-res-edit">
                      <div className="tj-two">
                        <div className="tj-field" style={{ marginBottom: 9 }}>
                          <label className="tj-label">訂位時間</label>
                          <input type="time" className="tj-fi" value={o.reservation.time} onChange={(e) => setRes(i, "time", e.target.value)} />
                        </div>
                        <div className="tj-field" style={{ marginBottom: 9 }}>
                          <label className="tj-label">人數</label>
                          <input type="number" min="1" className="tj-fi" value={o.reservation.party} onChange={(e) => setRes(i, "party", e.target.value)} />
                        </div>
                      </div>
                      <div className="tj-two">
                        <div className="tj-field" style={{ marginBottom: 9 }}>
                          <label className="tj-label">訂位人</label>
                          <input className="tj-fi" value={o.reservation.holder} onChange={(e) => setRes(i, "holder", e.target.value)} />
                        </div>
                        <div className="tj-field" style={{ marginBottom: 9 }}>
                          <label className="tj-label">訂位編號</label>
                          <input className="tj-fi" value={o.reservation.confirmation} onChange={(e) => setRes(i, "confirmation", e.target.value)} />
                        </div>
                      </div>
                      <div className="tj-field" style={{ marginBottom: 0 }}>
                        <label className="tj-label">地址</label>
                        <input className="tj-fi" value={o.reservation.address} onChange={(e) => setRes(i, "address", e.target.value)} />
                      </div>
                    </div>
                  )}
                </div>
              ))}
              <button className="tj-btn-add" onClick={addOpt} style={{ width: "100%" }}>＋ 新增一家餐廳</button>
            </div>
          ) : (
            <>
              <div className="tj-field">
                <label className="tj-label">地點名稱</label>
                <input className="tj-fi" placeholder="例：上野恩賜公園" value={it.location.name} onChange={(e) => setLoc("name", e.target.value)} />
              </div>
              <div className="tj-field">
                <label className="tj-label">地址（選填，可在地圖開啟）</label>
                <input className="tj-fi" value={it.location.address} onChange={(e) => setLoc("address", e.target.value)} />
              </div>
            </>
          )}

          <div className="tj-field" style={{ marginBottom: 0 }}>
            <label className="tj-label">詳細備註</label>
            <textarea className="tj-fi" placeholder="展開後顯示的詳細內容" value={it.notes} onChange={(e) => set("notes", e.target.value)} />
          </div>
        </div>

        <div className="tj-sheet-foot">
          {!isNew && (
            <button className="tj-btn-danger" onClick={() => (confirmDel ? onDelete() : setConfirmDel(true))}>
              {confirmDel ? "確定刪除" : "刪除"}
            </button>
          )}
          <button className="tj-btn-primary" onClick={save}>儲存</button>
        </div>
      </div>
    </div>
  );
}

/* ----------------------------- Shopping list ----------------------------- */
function ShoppingList() {
  const [items, setItems] = useState(null);
  const [text, setText] = useState("");
  const [cat, setCat] = useState(CATEGORIES[0]);
  const [filter, setFilter] = useState("全部");
  const [adding, setAdding] = useState(false);
  const loaded = useRef(false);

  useEffect(() => {
    let alive = true;
    (async () => {
      try {
        const res = await window.storage.get(LIST_KEY);
        if (alive && res && res.value) {
          setItems(JSON.parse(res.value));
          loaded.current = true;
          return;
        }
      } catch (e) {}
      const seeded = SEED_LIST.map((s) => ({ id: newId(), ...s }));
      if (alive) { setItems(seeded); loaded.current = true; }
    })();
    return () => { alive = false; };
  }, []);

  useEffect(() => {
    if (!loaded.current || items === null) return;
    (async () => { try { await window.storage.set(LIST_KEY, JSON.stringify(items)); } catch (e) {} })();
  }, [items]);

  if (items === null) return <p className="tj-empty">載入清單中…</p>;

  const add = () => {
    const t = text.trim();
    if (!t) return;
    setItems([{ id: newId(), text: t, category: cat, done: false }, ...items]);
    setText("");
    setAdding(false);
  };
  const toggle = (id) => setItems(items.map((i) => (i.id === id ? { ...i, done: !i.done } : i)));
  const remove = (id) => setItems(items.filter((i) => i.id !== id));

  const done = items.filter((i) => i.done).length;
  const visible = filter === "全部" ? items : items.filter((i) => i.category === filter);
  const grouped = CATEGORIES.map((c) => ({ cat: c, list: visible.filter((i) => i.category === c) })).filter((g) => g.list.length > 0);

  return (
    <div>
      <div className="tj-sl-head">
        <h2 className="tj-serif">購物</h2>
        <div className="tj-sl-right">
          <span className="tj-sl-prog tj-num">{done} / {items.length} 已確認</span>
          <button className="tj-icon-add" onClick={() => { setText(""); setAdding(true); }} aria-label="新增項目" title="新增項目">
            <svg viewBox="0 0 24 24" fill="none" strokeWidth="2.2" strokeLinecap="round"><path d="M12 5v14M5 12h14" /></svg>
          </button>
        </div>
      </div>

      <div className="tj-filters">
        {["全部", ...CATEGORIES].map((c) => (
          <button key={c} className="tj-filter" data-active={filter === c} onClick={() => setFilter(c)}>{c}</button>
        ))}
      </div>
      {grouped.length === 0 ? (
        <p className="tj-empty">這個分類還沒有項目。<br />點上方「新增項目」加入想買的東西。</p>
      ) : (
        grouped.map((g) => (
          <div key={g.cat}>
            <div className="tj-cat-head">{g.cat}</div>
            {g.list.map((it) => (
              <div className="tj-item" data-done={it.done} key={it.id}>
                <button className="tj-check" data-done={it.done} onClick={() => toggle(it.id)} aria-label={it.done ? "取消勾選" : "標記為已確認"}>
                  {it.done && <Check />}
                </button>
                <span className="tj-item-text">{it.text}</span>
                <button className="tj-del" onClick={() => remove(it.id)} aria-label="刪除">×</button>
              </div>
            ))}
          </div>
        ))
      )}

      {adding && (
        <div className="tj-overlay" onClick={() => setAdding(false)}>
          <div className="tj-sheet" onClick={(e) => e.stopPropagation()}>
            <div className="tj-sheet-head">
              <h3 className="tj-serif">新增項目</h3>
              <button className="tj-x" onClick={() => setAdding(false)} aria-label="關閉">×</button>
            </div>
            <div className="tj-sheet-body">
              <div className="tj-field">
                <label className="tj-label">品項</label>
                <input className="tj-fi" autoFocus placeholder="想買的東西…" value={text}
                  onChange={(e) => setText(e.target.value)} onKeyDown={(e) => e.key === "Enter" && add()} />
              </div>
              <div className="tj-field" style={{ marginBottom: 0 }}>
                <label className="tj-label">分類</label>
                <select className="tj-fi" value={cat} onChange={(e) => setCat(e.target.value)}>
                  {CATEGORIES.map((c) => (<option key={c} value={c}>{c}</option>))}
                </select>
              </div>
            </div>
            <div className="tj-sheet-foot">
              <button className="tj-btn-ghost" onClick={() => setAdding(false)}>取消</button>
              <button className="tj-btn-primary" onClick={add}>新增</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ----------------------------- App ----------------------------- */
function App() {
  const [now, setNow] = useState(new Date());
  const [tab, setTab] = useState("itinerary");
  const [expandedId, setExpandedId] = useState(null);
  const [editMode, setEditMode] = useState(false);

  const [trip, setTrip] = useState(null);
  const [selectedDay, setSelectedDay] = useState(0);
  const [editor, setEditor] = useState(null); // { dayIndex, itemIndex|null, initial }
  const [dayDelArm, setDayDelArm] = useState(false);
  const loaded = useRef(false);

  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 30000);
    return () => clearInterval(t);
  }, []);

  // load trip
  useEffect(() => {
    let alive = true;
    (async () => {
      try {
        const res = await window.storage.get(TRIP_KEY);
        if (alive && res && res.value) {
          setTrip(JSON.parse(res.value));
          loaded.current = true;
          return;
        }
      } catch (e) {}
      if (alive) { setTrip(seedTrip()); loaded.current = true; }
    })();
    return () => { alive = false; };
  }, []);

  // persist trip
  useEffect(() => {
    if (!loaded.current || trip === null) return;
    (async () => { try { await window.storage.set(TRIP_KEY, JSON.stringify(trip)); } catch (e) {} })();
  }, [trip]);

  // default to today's day once loaded
  useEffect(() => {
    if (!trip) return;
    const t = todayISO();
    const i = trip.days.findIndex((d) => d.date === t);
    setSelectedDay(i >= 0 ? i : 0);
  }, [trip ? trip.days.length : 0]);

  const banner = useMemo(() => {
    if (!trip) return null;
    const flat = [];
    trip.days.forEach((d, di) => {
      d.items.forEach((it) => {
        flat.push({ ...it, date: d.date, dayIndex: di, startDt: combine(d.date, it.start) });
      });
    });
    flat.sort((a, b) => a.startDt - b.startDt);
    const t = todayISO();
    const startedToday = flat.filter((f) => f.date === t && f.startDt <= now);
    const cur = startedToday.length ? startedToday[startedToday.length - 1] : null;
    const nxt = flat.find((f) => f.startDt > now) || null;
    return { current: cur, next: nxt };
  }, [trip, now]);

  if (!trip) {
    return (
      <div className="tj-root"><style>{STYLES}</style><div className="tj-wrap"><p className="tj-empty" style={{ paddingTop: 80 }}>載入行程中…</p></div></div>
    );
  }

  const safeDay = Math.min(selectedDay, trip.days.length - 1);
  const day = trip.days[safeDay];
  const isToday = day.date === todayISO();

  // ---- trip mutations ----
  const updateTrip = (fn) => setTrip((p) => fn(JSON.parse(JSON.stringify(p))));

  const setTitle = (v) => updateTrip((t) => { t.title = v; return t; });
  const setDayField = (k, v) => updateTrip((t) => { t.days[safeDay][k] = v; return t; });

  const addDay = () => {
    updateTrip((t) => {
      const last = t.days[t.days.length - 1];
      t.days.push({ id: newId(), date: last ? addDaysISO(last.date, 1) : todayISO(), theme: "新的一天", items: [] });
      return t;
    });
    setSelectedDay(trip.days.length); // new last
    setExpandedId(null);
  };
  const deleteDay = () => {
    if (trip.days.length <= 1) return;
    updateTrip((t) => { t.days.splice(safeDay, 1); return t; });
    setSelectedDay(Math.max(0, safeDay - 1));
    setDayDelArm(false);
    setExpandedId(null);
  };

  const openNewItem = () => setEditor({ dayIndex: safeDay, itemIndex: null, initial: emptyItem() });
  const openEditItem = (itemId) => {
    const idx = day.items.findIndex((x) => x.id === itemId);
    if (idx < 0) return;
    setEditor({ dayIndex: safeDay, itemIndex: idx, initial: day.items[idx] });
  };
  const saveItem = (item) => {
    updateTrip((t) => {
      const d = t.days[editor.dayIndex];
      if (editor.itemIndex === null) d.items.push(item);
      else d.items[editor.itemIndex] = item;
      d.items.sort((a, b) => (a.start < b.start ? -1 : a.start > b.start ? 1 : 0));
      return t;
    });
    setEditor(null);
  };
  const deleteItem = () => {
    updateTrip((t) => { t.days[editor.dayIndex].items.splice(editor.itemIndex, 1); return t; });
    setEditor(null);
  };

  // current activity (for timeline highlight only)
  const currentId = banner.current ? banner.current.id : null;

  return (
    <div className="tj-root">
      <style>{STYLES}</style>
      <div className="tj-wrap">
        <header className="tj-header">
          <div style={{ flex: 1 }}>
            <p className="tj-eyebrow">{trip.subtitle}</p>
            {editMode ? (
              <input className="tj-title-edit" value={trip.title} onChange={(e) => setTitle(e.target.value)} aria-label="行程標題" />
            ) : (
              <h1 className="tj-title tj-serif">{trip.title}</h1>
            )}
            <div className="tj-clock">
              <span><span className="tj-live" />現在</span>
              <b className="tj-num">{fmtClock(now)}</b>
              <span className="tj-num">· {fmtDateISO(todayISO())}</span>
            </div>
          </div>
          <button className="tj-editbtn" data-on={editMode} onClick={() => { setEditMode(!editMode); setDayDelArm(false); }} aria-label={editMode ? "完成編輯" : "編輯行程"} title={editMode ? "完成" : "編輯"}>
            {editMode ? <CheckBig /> : <Pencil />}
          </button>
        </header>

        <div className="tj-tabs">
          <button className="tj-tab" data-active={tab === "itinerary"} onClick={() => setTab("itinerary")}>行程</button>
          <button className="tj-tab" data-active={tab === "list"} onClick={() => setTab("list")}>購物</button>
        </div>

        {tab === "itinerary" ? (
          <>
            <div className="tj-days">
              {trip.days.map((d, i) => (
                <button key={d.id} className="tj-day" data-active={safeDay === i} onClick={() => { setSelectedDay(i); setExpandedId(null); setDayDelArm(false); }}>
                  {d.date === todayISO() && <span className="tj-day-today" />}
                  <div className="tj-day-k">Day {i + 1}</div>
                  <div className="tj-day-date tj-num">{fmtDateISO(d.date)}</div>
                  <div className="tj-day-theme">{d.theme}</div>
                </button>
              ))}
              {editMode && (
                <button className="tj-day-add" onClick={addDay}>＋ 新增一天</button>
              )}
            </div>

            {editMode ? (
              <div className="tj-day-edit">
                <div className="tj-day-edit-row">
                  <div className="tj-field" style={{ flex: 1, marginBottom: 0 }}>
                    <label className="tj-label">這天的主題</label>
                    <input className="tj-fi" placeholder="例：淺草・上野" value={day.theme} onChange={(e) => setDayField("theme", e.target.value)} />
                  </div>
                  <div className="tj-field" style={{ flex: "0 0 auto", width: 150, marginBottom: 0 }}>
                    <label className="tj-label">日期</label>
                    <input type="date" className="tj-fi" value={day.date} onChange={(e) => setDayField("date", e.target.value)} />
                  </div>
                </div>
                <div className="tj-day-edit-row" style={{ justifyContent: "flex-end" }}>
                  <button className="tj-mini" data-danger="true" disabled={trip.days.length <= 1}
                    style={{ opacity: trip.days.length <= 1 ? 0.4 : 1 }}
                    onClick={() => (dayDelArm ? deleteDay() : setDayDelArm(true))}>
                    {dayDelArm ? "確定刪除這天" : "刪除這天"}
                  </button>
                </div>
              </div>
            ) : (
              <div className="tj-day-head">
                <h2 className="tj-serif">{day.theme}</h2>
                <p>Day {safeDay + 1} · {fmtDateISO(day.date)}{isToday ? " · 今天" : ""}</p>
              </div>
            )}

            <Timeline
              day={day}
              isToday={isToday}
              now={now}
              currentId={currentId}
              expandedId={expandedId}
              setExpandedId={setExpandedId}
              editMode={editMode}
              onEditItem={openEditItem}
            />

            {editMode && (
              <div className="tj-add-row">
                <button className="tj-btn-add" onClick={openNewItem}>＋ 新增行程</button>
              </div>
            )}
          </>
        ) : (
          <ShoppingList />
        )}
      </div>

      {editor && (
        <ActivityEditor
          initial={editor.initial}
          isNew={editor.itemIndex === null}
          onSave={saveItem}
          onDelete={deleteItem}
          onClose={() => setEditor(null)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
