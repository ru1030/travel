.tj-root{
  --bg:#FCFCFB; --surface:#FFFFFF; --inset:#F4F4F1;
  --ink:#1B1C18; --muted:#74756C; --faint:#9A9B90;
  --line:#E7E6E0; --line-strong:#D9D8D1;
  --accent:#406399; --accent-soft:#E6EDF7; --accent-ink:#34527E;
  --now:#B26A2B; --now-soft:#F7ECDD; --danger:#B4504A;
  font-family:'Inter',-apple-system,system-ui,'PingFang TC','Noto Sans TC',sans-serif;
  color:var(--ink); background:var(--bg); min-height:100vh; -webkit-font-smoothing:antialiased;
}
.tj-wrap{max-width:540px;margin:0 auto;padding:0 16px 72px;}
.tj-stickybar{position:sticky;top:0;z-index:20;background:var(--bg);padding-top:14px;padding-bottom:10px;margin:0 -16px;padding-left:16px;padding-right:16px;transition:box-shadow .2s;}
.tj-stickybar[data-scrolled="true"]{box-shadow:0 6px 12px -8px rgba(20,22,18,.16);}
.tj-stickybar .tj-tabs{margin-bottom:10px;}
.tj-num{font-variant-numeric:tabular-nums;}
.tj-serif{font-family:'Fraunces',Georgia,serif;}

.tj-header{padding:24px 0 12px;display:flex;justify-content:space-between;align-items:flex-end;gap:12px;}
.tj-eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--faint);margin:0 0 6px;}
.tj-title{font-family:'Fraunces',serif;font-weight:600;font-size:30px;line-height:1.05;margin:0;}
.tj-title-edit{font-family:'Fraunces',serif;font-weight:600;font-size:26px;border:0;
  border-bottom:1.5px solid var(--line-strong);border-radius:0;padding:2px 1px 4px;background:transparent;color:var(--ink);width:100%;max-width:320px;}
.tj-title-edit:focus{outline:none;border-bottom-color:var(--accent);}
.tj-clock{display:flex;align-items:baseline;gap:8px;margin-top:0;color:var(--muted);font-size:13px;}
.tj-clock b{font-variant-numeric:tabular-nums;color:var(--ink);font-weight:600;font-size:15px;letter-spacing:.02em;}
.tj-live{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--now);margin-right:5px;animation:tj-pulse 2.4s infinite;}
.tj-editbtn{flex:0 0 auto;border:1px solid var(--line);background:var(--surface);color:var(--faint);
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;font-family:inherit;transition:all .15s;}
.tj-editbtn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.7;}
.tj-editbtn[data-on="true"]{background:var(--accent);border-color:var(--accent);color:#fff;}

.tj-tabs{display:flex;gap:4px;background:var(--inset);padding:4px;border-radius:12px;margin:8px 0 18px;}
.tj-tab{flex:1;border:0;background:transparent;color:var(--muted);font-size:14px;font-weight:600;
  padding:9px 0;border-radius:9px;cursor:pointer;font-family:inherit;transition:all .15s;}
.tj-tab[data-active="true"]{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.06);}

.tj-days{display:flex;gap:8px;padding:2px 4px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;scroll-snap-type:x proximity;overscroll-behavior-x:contain;cursor:grab;user-select:none;-webkit-user-select:none;}
.tj-days:active{cursor:grabbing;}
.tj-days::-webkit-scrollbar{display:none;}
.tj-day{flex:0 0 auto;border:1px solid var(--line);background:var(--surface);border-radius:12px;scroll-snap-align:start;
  padding:9px 13px;cursor:pointer;font-family:inherit;text-align:left;min-width:96px;transition:all .15s;position:relative;}
.tj-day[data-active="true"]{background:var(--accent);border-color:var(--accent);}
.tj-day-k{font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--muted);}
.tj-day[data-active="true"] .tj-day-k{color:#CAD6EF;}
.tj-day-date{font-size:13px;font-weight:600;color:var(--ink);margin-top:2px;font-variant-numeric:tabular-nums;}
.tj-day[data-active="true"] .tj-day-date{color:#fff;}
.tj-day-theme{font-size:11px;color:var(--faint);margin-top:1px;white-space:nowrap;max-width:120px;overflow:hidden;text-overflow:ellipsis;}
.tj-day[data-active="true"] .tj-day-theme{color:#AEC5D9;}
.tj-day-today{position:absolute;top:8px;right:9px;width:6px;height:6px;border-radius:50%;background:var(--now);}
.tj-day-add{flex:0 0 auto;border:1px dashed var(--line-strong);background:transparent;border-radius:12px;
  padding:9px 14px;cursor:pointer;font-family:inherit;color:var(--muted);font-size:13px;font-weight:600;min-width:72px;}
.tj-day-add:hover{border-color:var(--accent);color:var(--accent);}

.tj-day-head{margin:6px 0 14px;}
.tj-day-head h2{font-family:'Fraunces',serif;font-weight:600;font-size:21px;margin:0;}
.tj-day-head p{font-size:13px;color:var(--muted);margin:3px 0 0;}
.tj-day-edit{display:flex;flex-direction:column;gap:11px;margin:6px 0 16px;}
.tj-day-edit-row{display:flex;gap:14px;align-items:flex-end;}

.tj-add-row{display:flex;gap:9px;margin-bottom:14px;}
.tj-btn-add{flex:1;border:1px dashed var(--line-strong);background:transparent;border-radius:12px;
  padding:12px;cursor:pointer;font-family:inherit;color:var(--muted);font-size:14px;font-weight:600;}
.tj-btn-add:hover{border-color:var(--accent);color:var(--accent);}

.tj-line{position:relative;padding-left:56px;}
.tj-row{position:relative;margin-bottom:14px;}
.tj-time{position:absolute;left:-56px;top:14px;width:42px;text-align:right;font-size:12px;font-weight:600;
  color:var(--muted);font-variant-numeric:tabular-nums;line-height:1.3;}
.tj-time .tj-end{display:block;font-size:11px;font-weight:400;color:var(--faint);}

.tj-card{border:1px solid var(--line);background:var(--surface);border-radius:14px;overflow:hidden;transition:border-color .15s;position:relative;}
.tj-card-head{position:relative;}
.tj-row[data-state="past"] .tj-card{opacity:.62;}
.tj-row[data-state="current"] .tj-card{border-color:var(--now);border-width:1.5px;box-shadow:0 2px 10px rgba(178,106,43,.12);}
.tj-card-btn{width:100%;border:0;background:transparent;padding:13px 14px;cursor:pointer;color:var(--ink);
  font-family:inherit;text-align:left;display:flex;gap:10px;align-items:flex-start;}
.tj-type{flex:0 0 auto;font-size:10px;font-weight:600;letter-spacing:.06em;padding:3px 7px;border-radius:6px;
  background:var(--inset);color:var(--muted);margin-top:1px;}
.tj-type[data-t="meal"]{background:var(--accent-soft);color:var(--accent-ink);}
.tj-c-main{flex:1;min-width:0;display:flex;flex-direction:column;}
.tj-c-title{font-size:15px;font-weight:600;margin:0;line-height:1.3;color:var(--ink);}
.tj-c-brief{font-size:13px;color:var(--muted);margin:6px 0 0;line-height:1.45;}
.tj-chev{flex:0 0 auto;color:var(--faint);font-size:13px;margin-top:3px;transition:transform .2s;}
.tj-card-btn[aria-expanded="true"] .tj-chev{transform:rotate(180deg);}
.tj-live-tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--now);
  background:var(--now-soft);padding:2px 6px;border-radius:5px;margin-left:7px;vertical-align:middle;}
.tj-card-edit{position:absolute;top:10px;right:10px;border:1px solid var(--line);background:var(--surface);
  border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:14px;line-height:1;color:var(--muted);z-index:3;}
.tj-card-edit:hover{border-color:var(--accent);color:var(--accent);}
.tj-card-handle{position:absolute;top:0;left:0;bottom:0;width:34px;border:0;background:none;color:var(--faint);
  display:flex;align-items:center;justify-content:center;z-index:3;cursor:grab;touch-action:none;}
.tj-card-handle svg{width:16px;height:16px;}
.tj-card[data-dragging="true"]{opacity:.45;}
.tj-drop-ghost{border:1.5px dashed var(--accent);border-radius:14px;background:var(--accent-soft);height:54px;margin-bottom:14px;}
.tj-drag-floating{position:fixed;z-index:50;pointer-events:none;width:min(calc(100vw - 96px),444px);
  transform:translate(-50%,-50%);}
.tj-drag-floating .tj-card{box-shadow:0 10px 24px rgba(20,22,18,.18);border-color:var(--accent);}
.tj-drag-floating .tj-card-btn{padding:13px 14px;}

.tj-detail{border-top:1px solid var(--line);padding:13px 14px 15px;background:var(--bg);}
.tj-notes{font-size:13px;line-height:1.6;color:var(--ink);margin:0 0 10px;}
.tj-loc{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--accent);text-decoration:none;font-weight:500;}
.tj-loc:hover{text-decoration:underline;}
.tj-addr{font-size:12px;color:var(--faint);margin:4px 0 0;}

.tj-opt{border:1px solid var(--line);border-radius:11px;padding:11px 12px;margin-bottom:9px;background:var(--surface);}
.tj-opt:last-child{margin-bottom:0;}
.tj-opt[data-res="true"]{border-color:#C3D2E8;background:var(--accent-soft);}
.tj-opt-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.tj-opt-name{font-size:14px;font-weight:600;}
.tj-opt-meta{font-size:12px;color:var(--muted);}
.tj-pill{font-size:10px;font-weight:700;letter-spacing:.04em;padding:2px 7px;border-radius:20px;}
.tj-pill[data-res="true"]{background:var(--accent);color:#fff;}
.tj-pill[data-res="false"]{background:var(--inset);color:var(--muted);}
.tj-opt-note{font-size:12.5px;color:var(--muted);line-height:1.5;margin:6px 0 0;}
.tj-res{margin-top:9px;border-top:1px dashed #C3D2E8;padding-top:9px;display:grid;grid-template-columns:auto 1fr;gap:5px 12px;}
.tj-res dt{font-size:11px;color:var(--accent-ink);font-weight:600;opacity:.8;}
.tj-res dd{font-size:13px;margin:0;font-variant-numeric:tabular-nums;}
.tj-res a{color:var(--accent);text-decoration:none;}
.tj-res a:hover{text-decoration:underline;}

.tj-marker{position:relative;margin:2px 0 16px;display:flex;align-items:center;gap:8px;}
.tj-marker::before{content:"";position:absolute;left:-15px;top:50%;transform:translateY(-50%);
  width:11px;height:11px;border-radius:50%;background:var(--now);box-shadow:0 0 0 4px var(--now-soft);}
.tj-marker-line{flex:1;border-top:1.5px dashed var(--now);opacity:.55;}
.tj-marker-label{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--now);
  background:var(--now-soft);padding:2px 9px;border-radius:20px;font-variant-numeric:tabular-nums;white-space:nowrap;}

/* Shopping list */
.tj-sl-head{display:flex;align-items:center;justify-content:space-between;margin:4px 0 14px;}
.tj-sl-head h2{font-family:'Fraunces',serif;font-weight:600;font-size:21px;margin:0;}
.tj-sl-prog{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;}
.tj-sl-right{display:flex;align-items:center;gap:12px;}
.tj-icon-add{flex:0 0 auto;width:34px;height:34px;border-radius:10px;border:1px solid var(--accent);
  background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.tj-icon-add svg{width:14px;height:14px;stroke:currentColor;}
.tj-icon-add:active{transform:scale(.92);}
.tj-filters{display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;}
.tj-filters::-webkit-scrollbar{display:none;}
.tj-filter{flex:0 0 auto;border:0;border-bottom:2px solid transparent;background:transparent;border-radius:0;
  padding:6px 2px;font-size:13px;font-weight:600;color:var(--faint);cursor:pointer;font-family:inherit;transition:all .15s;}
.tj-filter[data-active="true"]{color:var(--ink);border-bottom-color:var(--ink);}
.tj-cat-head{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin:18px 0 4px;}
.tj-cat-head:first-child{margin-top:6px;}
.tj-item{display:flex;align-items:center;gap:12px;padding:13px 2px;border-bottom:1px solid var(--line);}
.tj-check{flex:0 0 auto;width:21px;height:21px;border-radius:50%;border:2px solid var(--line-strong);
  background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:all .15s;}
.tj-check[data-done="true"]{background:var(--accent);border-color:var(--accent);}
.tj-check svg{width:12px;height:12px;stroke:#fff;}
.tj-item-text{flex:1;font-size:14px;}
.tj-item[data-done="true"] .tj-item-text{color:var(--faint);text-decoration:line-through;}
.tj-del{flex:0 0 auto;border:0;background:transparent;color:var(--faint);cursor:pointer;font-size:18px;
  padding:2px 6px;border-radius:6px;line-height:1;font-family:inherit;}
.tj-del:hover{color:var(--danger);background:var(--inset);}
.tj-empty{text-align:center;color:var(--faint);font-size:13px;padding:40px 0;line-height:1.6;}

/* Expenses */
.tj-exp-total{border:0;border-bottom:1px solid var(--line);padding:2px 0 16px;margin-bottom:6px;}
.tj-exp-total .tj-exp-amt{font-family:'Fraunces',serif;font-weight:600;font-size:30px;font-variant-numeric:tabular-nums;line-height:1.1;}
.tj-exp-total .tj-exp-sub{font-size:12px;color:var(--faint);margin-top:4px;}
.tj-scan{display:flex;gap:9px;margin:16px 0 8px;}
.tj-scan-btn{flex:1;border:1px solid var(--accent);background:var(--accent-soft);color:var(--accent-ink);
  border-radius:12px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:7px;}
.tj-scan-btn:active{transform:scale(.99);}
.tj-scan-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;}
.tj-exp-cat{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin:18px 0 4px;}
.tj-exp-row{display:flex;align-items:flex-start;gap:11px;padding:13px 2px;border-bottom:1px solid var(--line);cursor:pointer;}
.tj-exp-row[data-expanded="true"]{border-bottom-color:transparent;padding-bottom:6px;}
.tj-exp-chip{flex:0 0 auto;font-size:10px;font-weight:600;letter-spacing:.04em;padding:3px 8px;border-radius:20px;
  background:var(--accent-soft);color:var(--accent-ink);margin-top:2px;}
.tj-exp-main{flex:1;min-width:0;}
.tj-exp-merchant{font-size:14.5px;font-weight:600;line-height:1.3;}
.tj-exp-date{font-size:12px;color:var(--faint);margin-top:2px;font-variant-numeric:tabular-nums;}
.tj-exp-val{flex:0 0 auto;font-size:14.5px;font-weight:600;font-variant-numeric:tabular-nums;text-align:right;}
.tj-exp-detail{display:flex;align-items:center;gap:11px;margin-top:2px;padding-bottom:8px;border-bottom:1px solid var(--line);}
.tj-exp-detail-gutter{flex:0 0 auto;width:30px;}
.tj-exp-detail-text{flex:1;min-width:0;font-size:12.5px;color:var(--muted);line-height:1.6;}
.tj-exp-note{font-size:12.5px;color:var(--faint);margin-top:6px;line-height:1.5;}
.tj-exp-actions{flex:0 0 auto;display:flex;gap:4px;}
.tj-exp-icon-btn{border:0;background:none;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:inherit;padding:0;}
.tj-exp-icon-btn svg{width:14px;height:14px;stroke:currentColor;}
.tj-exp-icon-btn[data-act="edit"]{color:var(--accent);}
.tj-exp-icon-btn[data-act="delete"]{color:var(--danger);}
.tj-exp-icon-btn[data-act="delete"][data-arm="true"]{color:#fff;background:var(--danger);border-radius:7px;}
.tj-spinner{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;
  animation:tj-spin .8s linear infinite;margin:0 auto 14px;}
.tj-scan-state{text-align:center;padding:30px 20px;}
.tj-scan-state p{font-size:14px;color:var(--muted);margin:0;}
@keyframes tj-spin{to{transform:rotate(360deg);}}

/* Modal / sheet editor */
.tj-overlay{position:fixed;inset:0;background:rgba(20,22,18,.42);display:flex;align-items:flex-end;
  justify-content:center;z-index:50;padding:0;animation:tj-fade .15s;}
.tj-sheet{background:var(--bg);width:100%;max-width:540px;max-height:90vh;border-radius:20px 20px 0 0;
  display:flex;flex-direction:column;animation:tj-slide .2s;}
.tj-sheet-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;border-bottom:1px solid var(--line);}
.tj-sheet-head h3{font-family:'Fraunces',serif;font-size:18px;font-weight:600;margin:0;}
.tj-x{border:0;background:transparent;font-size:22px;color:var(--muted);cursor:pointer;line-height:1;padding:2px 6px;font-family:inherit;}
.tj-sheet-body{overflow-y:auto;padding:16px 18px;flex:1;}
.tj-sheet-foot{display:flex;gap:9px;padding:13px 18px;border-top:1px solid var(--line);background:var(--bg);}
.tj-field{margin-bottom:14px;}
.tj-label{display:block;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:0 0 6px;}
.tj-fi{width:100%;border:0;border-bottom:1.5px solid var(--line-strong);border-radius:0;padding:7px 1px;font-size:15px;
  font-family:inherit;background:transparent;color:var(--ink);}
input[type="date"].tj-fi{height:33px;padding:0 1px;}
.tj-time-picker{display:flex;align-items:center;gap:5px;}
.tj-time-sel{flex:0 0 auto;width:52px;text-align:center;height:33px;padding:0;}
.tj-time-colon{color:var(--faint);font-weight:600;flex:0 0 auto;}
.tj-time-custom{flex:1;min-width:0;height:33px;padding:0 1px;font-size:13px;}
.tj-time-custom::placeholder{font-size:12px;}
.tj-fi:focus{outline:none;border-bottom-color:var(--accent);}
.tj-fi::placeholder{color:var(--faint);}
textarea.tj-fi{resize:vertical;min-height:54px;line-height:1.6;}
select.tj-fi{-webkit-appearance:none;appearance:none;line-height:1.4;height:33px;
  background-image:linear-gradient(45deg,transparent 50%,var(--faint) 50%),linear-gradient(135deg,var(--faint) 50%,transparent 50%);
  background-position:right 6px center,right 1px center;background-size:5px 5px,5px 5px;background-repeat:no-repeat;}
select.tj-fi{appearance:none;-webkit-appearance:none;cursor:pointer;
  background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);
  background-position:calc(100% - 14px) 14px,calc(100% - 9px) 14px;background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:24px;}
.tj-two{display:flex;gap:10px;}
.tj-amount-line{display:flex;align-items:center;gap:5px;font-size:15px;color:var(--ink);padding:7px 1px;border-bottom:1.5px solid var(--line-strong);}
.tj-amount-unit{color:var(--faint);font-size:13px;flex:0 0 auto;}
.tj-amount-input{flex:1 1 0;min-width:0;border:0;background:transparent;color:var(--ink);font-size:16px;font-weight:600;font-family:inherit;padding:0;}
.tj-amount-sep{color:var(--faint);font-size:12px;flex:0 0 auto;}
.tj-rate-input{flex:0 0 auto;width:44px;border:0;background:transparent;color:var(--ink);font-size:13px;font-family:inherit;text-align:center;padding:0;}
.tj-rate-input:focus{outline:none;border-bottom-color:var(--accent);}
.tj-amount-result{flex:0 0 auto;font-weight:600;font-size:13px;font-variant-numeric:tabular-nums;white-space:nowrap;}
.tj-two > .tj-field{flex:1;}
.tj-seg{display:flex;gap:6px;}
.tj-seg-btn{flex:1;border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:9px 0;
  font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit;}
.tj-seg-btn[data-on="true"]{background:var(--accent);border-color:var(--accent);color:#fff;}
.tj-oedit{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;background:var(--surface);}
.tj-oedit-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
.tj-oedit-top span{font-size:12px;font-weight:700;letter-spacing:.08em;color:var(--faint);text-transform:uppercase;}
.tj-toggle{display:flex;align-items:center;gap:9px;cursor:pointer;font-size:13px;font-weight:600;color:var(--ink);margin:4px 0 2px;}
.tj-sw{width:38px;height:22px;border-radius:20px;background:var(--line-strong);position:relative;transition:background .15s;flex:0 0 auto;}
.tj-sw::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .15s;}
.tj-toggle[data-on="true"] .tj-sw{background:var(--accent);}
.tj-toggle[data-on="true"] .tj-sw::after{transform:translateX(16px);}
.tj-res-edit{margin-top:11px;border-top:1px dashed var(--line);padding-top:11px;}
.tj-mini{border:0;background:transparent;color:var(--accent);font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;padding:0;}
.tj-mini[data-danger="true"]{color:var(--danger);}
.tj-btn-primary{flex:1;border:0;background:var(--accent);color:#fff;border-radius:11px;padding:13px;font-size:15px;
  font-weight:600;cursor:pointer;font-family:inherit;}
.tj-btn-ghost{border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:11px;
  padding:13px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.tj-btn-danger{border:1px solid #E6CBC8;background:#FBF1F0;color:var(--danger);border-radius:11px;
  padding:13px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.tj-reset{display:block;margin:22px auto 0;border:0;background:transparent;color:var(--faint);
  font-size:12px;cursor:pointer;font-family:inherit;text-decoration:underline;}

@keyframes tj-pulse{0%,100%{opacity:1;}50%{opacity:.45;}}
@keyframes tj-fade{from{opacity:0;}to{opacity:1;}}
@keyframes tj-slide{from{transform:translateY(16px);}to{transform:translateY(0);}}
@media (prefers-reduced-motion: reduce){
  .tj-live,.tj-marker::before{animation:none;}
  .tj-overlay,.tj-sheet{animation:none;}
  *{transition:none!important;}
}
.tj-center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.tj-card-pane{width:100%;max-width:360px;}
.tj-ob-title{font-family:'Fraunces',serif;font-size:24px;font-weight:600;margin:0 0 6px;}
.tj-ob-sub{font-size:13px;color:var(--muted);margin:0 0 22px;line-height:1.6;}
.tj-ob-q{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin:0 0 10px;}
.tj-ob-big{display:flex;gap:10px;margin-bottom:22px;}
.tj-ob-big button{flex:1;border:1px solid var(--line);background:var(--surface);border-radius:14px;padding:16px 0;font-size:17px;font-weight:600;font-family:inherit;cursor:pointer;color:var(--ink);}
.tj-ob-big button[data-on="true"]{background:var(--accent);border-color:var(--accent);color:#fff;}
.tj-ob-code{font-variant-numeric:tabular-nums;font-size:18px;font-weight:600;letter-spacing:.02em;word-break:break-all;background:var(--inset);border-radius:10px;padding:12px 14px;text-align:center;margin:4px 0 12px;}
.tj-link{background:none;border:0;color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;padding:10px 0;display:block;width:100%;}
.tj-head-actions{display:flex;gap:8px;align-items:flex-end;}
.tj-pay-chip{flex:0 0 auto;width:30px;text-align:center;font-size:11px;font-weight:700;padding:3px 0;border-radius:20px;background:var(--inset);color:var(--muted);margin-top:1px;}
.tj-pay-chip[data-me="true"]{background:var(--accent-soft);color:var(--accent-ink);}
.tj-exp-sub2{font-size:12px;color:var(--faint);margin-top:2px;}
.tj-sum-row{display:flex;gap:18px;font-size:13px;color:var(--muted);margin:2px 0 6px;}
.tj-sum-row b{color:var(--ink);font-variant-numeric:tabular-nums;}
.tj-settle{border:1px solid var(--line);border-radius:16px;background:var(--surface);padding:16px;margin-top:24px;}
.tj-settle h3{font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:0 0 10px;}
.tj-settle-line{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);}
.tj-settle-line:last-of-type{border-bottom:0;}
.tj-settle-line .k{color:var(--muted);font-size:13px;}
.tj-settle-line .v{font-size:14px;font-weight:600;}
.tj-settle-line .v b{font-variant-numeric:tabular-nums;}
.tj-settle-zero{color:var(--faint);font-weight:500;}
.tj-settle-btn{width:100%;border:0;background:var(--accent);color:#fff;border-radius:11px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:14px;}
.tj-settle-btn:disabled{opacity:.4;cursor:default;}
.tj-settle-btn[data-arm="true"]{background:var(--danger);}
.tj-settle-cancel{display:block;width:100%;text-align:center;background:none;border:0;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;padding:10px 0 0;}
.tj-exp-settle-entry{flex:0 0 auto;border:0;background:none;color:var(--accent);padding:0;height:24px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:3px;}
.tj-exp-settle-entry svg{width:18px;height:18px;stroke:currentColor;flex:0 0 auto;}
.tj-exp-add-entry{flex:0 0 auto;border:0;background:none;color:var(--accent);width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:inherit;padding:0;transition:transform .18s;}
.tj-exp-add-entry svg{width:20px;height:20px;stroke:currentColor;}
.tj-exp-add-entry.tj-spin{transform:rotate(90deg);}
.tj-changes{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);}
.tj-change-item{font-size:12px;color:var(--muted);line-height:1.5;padding:4px 0;}
.tj-hist{border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px;background:var(--surface);}
.tj-hist-date{font-size:12px;color:var(--faint);margin-bottom:5px;}
.tj-hist-line{font-size:13px;display:flex;justify-content:space-between;padding:2px 0;}
.tj-hist-line .v{font-variant-numeric:tabular-nums;font-weight:600;}
.tj-diff{font-size:12px;margin-top:6px;}
.tj-diff[data-ok="true"]{color:var(--accent-ink);}
.tj-diff[data-ok="false"]{color:var(--danger);}
